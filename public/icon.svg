<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0b0f19" />
  
  <!-- Outer glowing circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad)" stroke-width="16" opacity="0.3" filter="url(#glow)" />
  
  <!-- Main ring representing timeline/clock -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#grad)" stroke-width="20" stroke-linecap="round" stroke-dasharray="700 240" transform="rotate(-90 256 256)" />
  
  <!-- Hourglass / S letter shape inside -->
  <path d="M196 176 H316 L256 256 L196 336 H316" fill="none" stroke="url(#grad)" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Glowing center dot -->
  <circle cx="256" cy="256" r="12" fill="#ffffff" filter="url(#glow)" />
</svg>
